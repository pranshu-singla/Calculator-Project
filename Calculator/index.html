<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator • Pure HTML/CSS/JS</title>
  <meta name="description" content="Accessible calculator with keyboard support and safe expression parser." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="calc" role="application" aria-label="Calculator">
      <div class="display" aria-live="polite" aria-atomic="true">
        <div class="expression" id="expression" title="Expression"></div>
        <div class="result" id="result" title="Result">0</div>
      </div>

      <div class="keys" id="keys">
        <!-- Top row -->
        <button data-action="clear" class="danger" aria-label="Clear all (C)">C</button>
        <button data-action="delete" aria-label="Backspace (⌫)">⌫</button>
        <button data-value="%" aria-label="Percent">%</button>
        <button data-value="/" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="*" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="-" aria-label="Minus">−</button>

        <!-- Row 4 -->
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="+" aria-label="Plus">+</button>

        <!-- Row 5 -->
        <button data-action="negate" aria-label="Toggle sign">±</button>
        <button data-value="0">0</button>
        <button data-value="." aria-label="Decimal point">.</button>
        <button data-action="equals" class="primary" aria-label="Equals">=</button>
      </div>

      <div class="extras">
        <button data-value="(" aria-label="Open parenthesis">(</button>
        <button data-value=")" aria-label="Close parenthesis">)</button>
        <button data-value="^" aria-label="Power">xʸ</button>
        <button id="themeToggle" aria-label="Toggle theme">🌓</button>
      </div>
    </section>

    <footer class="credits">
      <span>Built with ❤️ — No libraries, no eval, full keyboard support.</span>
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
